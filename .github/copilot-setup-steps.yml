# GitHub Copilot CLI Agent Setup Steps
# Configures the Copilot cloud agent for optimized MyMonoRepo development
# See: https://docs.github.com/en/copilot/managing-copilot/configure-copilot-settings-for-your-organization

agent:
  name: Copilot Coding Agent
  description: Optimized for .NET 10 monorepo with vertical slices

preinstall_tools:
  - name: dotnet
    version: "10.0"
    description: ".NET 10 SDK"

  - name: git
    description: "Version control"

environment:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

build_commands:
  - name: "Restore dependencies"
    command: "dotnet restore"
    
  - name: "Build solution"
    command: "dotnet build MyMonoRepo.sln"

test_commands:
  - name: "Run tests"
    command: "dotnet test MyMonoRepo.sln"

# Customize agents to use the Programmer persona from docs/agents/AGENT-Programmer.md
agent_files:
  - path: ".github/agents/programmer.yml"
    description: "C# developer specialist for .NET 10 vertical slices"
