name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (with coverage)
        run: |
          dotnet test ./tests/**/*.csproj --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=./TestResults/coverage.cobertura.xml
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
      - name: Generate coverage report
        run: |
          reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"coverage-report" -reporttypes:Html;Cobertura
      - name: Check coverage threshold
        shell: pwsh
        run: |
          $cov = Get-ChildItem -Path . -Filter 'coverage.cobertura.xml' -Recurse | Select-Object -First 1
          if (-not $cov) { Write-Error 'Coverage report not found'; exit 1 }
          $xml = [xml](Get-Content $cov.FullName)
          # try multiple attributes depending on report format
          $lineRate = 0
          if ($xml.coverage -and $xml.coverage.'@line-rate') { $lineRate = [double]$xml.coverage.'@line-rate' }
          elseif ($xml.GetType().Name -eq 'XmlDocument') { $node = $xml.SelectSingleNode('//coverage'); if ($node -and $node.Attributes['line-rate']) { $lineRate = [double]$node.Attributes['line-rate'].Value } }
          Write-Host "Coverage (line-rate): $lineRate"
          if ($lineRate -lt 0.8) { Write-Error "Code coverage $([math]::Round($lineRate*100,2))% is below threshold (80%)"; exit 1 }
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-report/*Coverage*.xml
          fail_ci_if_error: true
