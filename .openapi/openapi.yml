openapi: 3.1.0
info:
  title: MyMonoRepo API
  description: |
    Monorepo API built with .NET 10 using vertical slice architecture.
    - Docs: https://jimmybogard.com/vertical-slice-architecture/
    - Patterns: MediatR for CQRS, DI for dependency injection
  version: 1.0.0
  contact:
    name: Development Team
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /:
    get:
      summary: Root endpoint
      operationId: getRoot
      tags:
        - Health
      responses:
        '200':
          description: API is running
          content:
            text/plain:
              schema:
                type: string
                example: "Welcome to MyMonoRepo API"
